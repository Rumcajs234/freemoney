<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automatyczne Tworzenie Kont</title>
</head>
<body>

    <h1>Automatyczne Tworzenie Kont</h1>
    <p>Liczba utworzonych kont: 0</p>

    <script>
        let liczbaKont = 0;

        function tworzKonto() {
            liczbaKont++;
            document.getElementById('licznik').innerText = 'Utworzono '+liczbaKont+' kont.';
        }

        // Ustawiamy czas oczekiwania między tworzeniem kont
        setTimeout(tworzKonto, 15000);

        // Pobieranie kodu Captcha, który musimy rozwiązać aby móc kontynuować
        let data = {
            'action' => 'get_captcha',
            'i' => 60ff80,
        };

        fetch('https://babylune.mov/register?i=60ff80', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: new URLSearchParams(data).toString()
        })
        .then(response => response.text())
        .then(response => {
            // Rozwiązujemy kod Captcha
            let captchaCode = response.match(/\d{4}/)[0];

            if (captchaCode) {
                // Dane logowania do konta
                data = {
                    'username': 'automatyczny_user',
                    'password': 'haslo_automatyczne',
                    'captcha': captchaCode,
                };

                fetch('https://babylune.mov/register?i=60ff80', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: new URLSearchParams(data).toString()
                })
                .then(response => response.text())
                .then(response => {
                    // Sprawdzamy status rejestracji konta
                    if (response.includes('rejestracja udana')) {
                        document.getElementById('licznik').innerText = 'Utworzono '+(parseInt(document.getElementById('licznik').innerText.match(/\d+/)[0])+1)+' kont.';
                    } else {
                        document.getElementById('licznik').innerText = 'Rejestracja nie powiodła się.';
                    }
                });
            } else {
                document.getElementById('licznik').innerText = 'Nie udało się pobrać kodu Captcha.';
            }
        });

        // Zapisujemy dane logowania do pliku
        fetch('https://babylune.mov/register?i=a4df89', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: new URLSearchParams({
                'username': 'automatyczny_user',
                'password': 'haslo_automatyczne',
            }).toString()
        })
        .then(response => response.text())
        .then(response => {
            document.getElementById('licznik').innerText = 'Dane logowania zapisano do pliku.';
        });
    </script>

</body>
</html>
